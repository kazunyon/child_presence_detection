services:
  - type: web
    name: mamoru-bus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mamoru-bus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://kazunyon.github.io
      - key: ENVIRONMENT
        value: production
databases:
  - name: mamoru-bus-db
    plan: starter
