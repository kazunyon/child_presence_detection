services:
  - type: web
    name: mamoru-bus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: mamoru-bus-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mamoru-bus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://kazunyon.github.io
      - key: ENVIRONMENT
        value: production
      - key: UPLOAD_DIR
        value: /var/data/mamoru-bus-uploads
      - key: TOKEN_EXPIRE_MINUTES
        value: '480'
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_ORGANIZATION_ID
        sync: false
databases:
  - name: mamoru-bus-db
    plan: starter
